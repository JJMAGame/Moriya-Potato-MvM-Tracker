<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MvM Missions Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h1 {
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .stat-box span {
            font-weight: bold;
            font-size: 18px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .btn-reset {
            background: #c0392b;
            color: white;
        }

        .btn-reset:hover {
            background: #e74c3c;
            transform: scale(1.02);
        }

        .btn-export {
            background: #2980b9;
            color: white;
        }

        .btn-export:hover {
            background: #3498db;
            transform: scale(1.02);
        }

        .btn-import {
            background: #27ae60;
            color: white;
        }

        .btn-import:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        .search-box {

        .checkbox-container {

        .checkmark {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid #555;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #c0392b;
        }

        .checkbox-container input:checked + .checkmark {
            background: #27ae60;
            border-color: #27ae60;
        }

        .checkbox-container input:checked + .checkmark::after {
            content: '✓';
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .checkbox-container input:not(:checked) + .checkmark::after {
            content: '✗';
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .checkbox-container input:checked + .checkmark:hover {
            background: #2ecc71;
            transform: scale(1.05);
        }

        .checkbox-container input:not(:checked) + .checkmark:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }

            color: #e94560;
        }

        }

        .operation-name {

        }

            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #c0392b;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 8px;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .stats {
                justify-content: center;
            }

            .actions {
                justify-content: center;
            }

            .stat-box {
                padding: 6px 12px;
                font-size: 12px;
            }

            .difficulty-intermediate,
            .difficulty-advanced,
            .difficulty-expert,
            .difficulty-nightmare,
            .difficulty-master,
            .difficulty-reverse {
                font-size: 9px;
                padding: 2px 8px;
            }

            .checkmark {

                height: 18px;
            }

            .checkbox-container input:checked + .checkmark::after,
            .checkbox-container input:not(:checked) + .checkmark::after {
                font-size: 12px;
            }

            h1 {

            }

                font-size: 11px;

            }
        }

        @media (max-width: 480px) {

            }

            }

<script>
    // ============================================================
    // CONFIGURAÇÃO - ALTERE AQUI!
    // ============================================================

    const GITHUB_REPO = 'JJMAGame/Moriya-Potato-MvM-Tracker';  
    const GITHUB_BRANCH = 'main';                       // 'main' ou 'master'
    const SAVE_FOLDER = 'Save-progress';                // Nome da pasta
    const GITHUB_TOKEN = ''; // Deixe vazio (repositório é público)

    console.log('📂 Repositório:', GITHUB_REPO);
    console.log('📁 Pasta:', SAVE_FOLDER);
    console.log('🌿 Branch:', GITHUB_BRANCH);

    // ============================================================
    // FUNÇÕES
    // ============================================================

    // Abrir modal
    function abrirModalGitHub() {
        const modal = document.getElementById('githubModal');
        modal.classList.add('active');
        document.getElementById('pastaNome').textContent = SAVE_FOLDER;
        listarArquivosGitHub();
    }

    // Fechar modal
    function fecharModalGitHub() {
        document.getElementById('githubModal').classList.remove('active');
    }

    // Fecha modal ao clicar fora
    document.getElementById('githubModal').addEventListener('click', function(e) {
        if (e.target === this) {
            fecharModalGitHub();
        }
    });

    // Atualizar lista (botão)
    function atualizarLista() {
        listarArquivosGitHub();
        showToast('🔄 Lista atualizada!', 'info');
    }

    // ============================================================
    // LER A PASTA DO GITHUB
    // ============================================================
    async function listarArquivosGitHub() {
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '<li class="loading">⏳ Carregando arquivos...</li>';

        try {
            // URL da API do GitHub para listar a pasta
            const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${SAVE_FOLDER}?ref=${GITHUB_BRANCH}`;
            const response = await fetch(url);

            if (!response.ok) {
                if (response.status === 404) {
                    fileList.innerHTML = `<li class="empty">📂 Pasta "${SAVE_FOLDER}" não encontrada</li>`;
                    return;
                }
                throw new Error(`Erro ${response.status}`);
            }

            const data = await response.json();

            // Filtra apenas arquivos .json
            const jsonFiles = data.filter(item => 
                item.type === 'file' && 
                item.name.endsWith('.json')
            );

            if (jsonFiles.length === 0) {
                fileList.innerHTML = '<li class="empty">📭 Nenhum arquivo .json encontrado</li>';
                return;
            }

            // Ordena por data (mais recente primeiro)
            jsonFiles.sort((a, b) => new Date(b.sha) - new Date(a.sha));

            // Monta a lista
            fileList.innerHTML = '';
            jsonFiles.forEach(file => {
                const li = document.createElement('li');
                
                // Extrai a data do nome do arquivo (formato: algo_2024-01-15.json)
                let dataExibicao = '';
                const match = file.name.match(/(\d{4}-\d{2}-\d{2})/);
                if (match) {
                    const partes = match[1].split('-');
                    dataExibicao = `${partes[2]}/${partes[1]}/${partes[0]}`;
                } else {
                    // Se não tiver data no nome, usa a data do commit
                    const dataCommit = new Date(file.sha);
                    dataExibicao = dataCommit.toLocaleDateString('pt-BR');
                }

                li.innerHTML = `
                    <span>📄 ${file.name}</span>
                    <span class="file-date">${dataExibicao}</span>
                `;

                li.addEventListener('click', () => {
                    importarArquivo(file.download_url, file.name);
                });

                fileList.appendChild(li);
            });

        } catch (error) {
            console.error('Erro ao listar arquivos:', error);
            fileList.innerHTML = `<li class="empty">❌ Erro: ${error.message}</li>`;
            showToast('❌ Erro ao ler a pasta', 'error');
        }
    }

// ============================================================
// IMPORTAR ARQUIVO DO GITHUB E APLICAR
// ============================================================
async function importarArquivo(url, fileName) {
    try {
        const nomeExibicao = getNomePersonalizado(fileName);
        showToast(`⏳ Baixando ${nomeExibicao}...`, 'info');

        // 1️⃣ BAIXA O ARQUIVO
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`Erro ${response.status}`);
        }

        const data = await response.json();

        // 2️⃣ VERIFICA SE TEM O CAMPO "progress"
        if (data.progress && Array.isArray(data.progress)) {
            
            // 3️⃣ VERIFICA SE O TAMANHO É IGUAL AO NÚMERO DE MISSÕES
            if (data.progress.length !== missions.length) {
                showToast(`❌ Tamanho do progresso não coincide! (${data.progress.length} vs ${missions.length})`, 'error');
                return;
            }
            
            // 4️⃣ APLICA O PROGRESSO
            checkedStates = data.progress;  // ← ATUALIZA O ARRAY
            
            // 5️⃣ SALVA NO LOCALSTORAGE
            localStorage.setItem('mvm_progress', JSON.stringify(checkedStates));
            
            // 6️⃣ FECHA O MODAL
            fecharModalGitHub();
            
            // 7️⃣ ATUALIZA A TABELA
            renderTable();  // ← ESSA É A LINHA QUE FALTAVA!
            
            // 8️⃣ MOSTRA NOTIFICAÇÃO
            const total = data.progress.length;
            const concluidas = data.progress.filter(c => c).length;
            showToast(`✅ "${nomeExibicao}" importado! (${concluidas}/${total})`);
            
            console.log('📥 Arquivo importado:', fileName);
            console.log(`📊 ${concluidas} de ${total} missões concluídas`);
            console.log('📋 Progresso:', checkedStates);
            
        } else {
            showToast('❌ Arquivo JSON inválido (campo "progress" não encontrado)', 'error');
        }

    } catch (error) {
        console.error('Erro ao importar:', error);
        showToast(`❌ Erro ao importar: ${error.message}`, 'error');
    }
}

// ============================================================
// NOMES PERSONALIZADOS
// ============================================================
const NOMES_PERSONALIZADOS = {
    // "nome_do_arquivo.json": "Nome que vai aparecer",
    "Zero.json": "⭐ Progresso Zero",
    // "progresso_2024-01-15.json": "📌 Progresso - Início do Mês",
};

function getNomePersonalizado(nomeArquivo) {
    // Se tiver nome personalizado, usa ele
    if (NOMES_PERSONALIZADOS[nomeArquivo]) {
        return NOMES_PERSONALIZADOS[nomeArquivo];
    }
    
    // Se não tiver, formata o nome
    const nomeSemExtensao = nomeArquivo.replace('.json', '');
    const nomeFormatado = nomeSemExtensao
        .replace(/_/g, ' ')
        .replace(/-/g, ' ')
        .replace(/\b\w/g, letra => letra.toUpperCase());
    
    return `📄 ${nomeFormatado}`;
}

// ============================================================
// EXPORTAR PROGRESSO (DOWNLOAD)
// ============================================================
function exportarProgresso() {
    // Pega o progresso atual
    const progress = checkedStates; // Seu array de booleanos
    
    // Monta o JSON com os dados
    const dados = {
        exportedAt: new Date().toISOString(),
        totalMissions: missions.length,
        progress: progress
    };
    
    // Converte para JSON formatado
    const json = JSON.stringify(dados, null, 2);
    
    // Cria o arquivo para download
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    
    // Cria link para download
    const a = document.createElement('a');
    a.href = url;
    const dataAtual = new Date().toISOString().slice(0, 10);
    a.download = `progresso_${dataAtual}.json`;
    
    // Dispara o download
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    // Libera a URL
    URL.revokeObjectURL(url);
    
    // Mostra notificação
    showToast(`📤 Progresso exportado! (${dados.totalMissions} missões)`, 'info');
}

    // ============================================================
    // TOAST (NOTIFICAÇÕES)
    // ============================================================
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast';
        if (type === 'error') toast.classList.add('error');
        if (type === 'info') toast.classList.add('info');
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    console.log('✅ Botão GitHub carregado!');
    console.log(`📂 Lendo pasta: ${SAVE_FOLDER}`);

        // ============================================================
        // LÓGICA DA TABELA COM localStorage
        // ============================================================
        const STORAGE_KEY = 'mvm_progress';

        function loadProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length === missions.length) {
                        return parsed;
                    }
                }
            } catch (e) {
                console.warn('Erro ao carregar progresso:', e);
            }
            return new Array(missions.length).fill(false);
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedStates));
                showToast('✅ Progresso salvo automaticamente!');
            } catch (e) {
                console.warn('Erro ao salvar progresso:', e);
            }
        }

        let checkedStates = loadProgress();

        const tbody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const filterDifficulty = document.getElementById('filterDifficulty');
        const filterStatus = document.getElementById('filterStatus');

        function getDifficultyClass(difficulty) {
            const lower = difficulty.toLowerCase();
            if (lower.includes('intermediate')) return 'difficulty-intermediate';
            if (lower.includes('advanced')) return 'difficulty-advanced';
            if (lower.includes('expert')) return 'difficulty-expert';
            if (lower.includes('nightmare')) return 'difficulty-nightmare';
            if (lower.includes('master')) return 'difficulty-master';
            return 'difficulty-reverse';
        }

        function getRowClass(difficulty) {
            const lower = difficulty.toLowerCase();
            if (lower.includes('nightmare')) return 'row-nightmare';
            if (lower.includes('master')) return 'row-master';
            if (lower.includes('reverse')) return 'row-reverse';
            return '';
        }

        function renderTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const diffFilter = filterDifficulty.value;
            const statusFilter = filterStatus.value;

            let filtered = missions.map((m, i) => ({ ...m, index: i, checked: checkedStates[i] }));

            if (searchTerm) {
                filtered = filtered.filter(m =>
                    m.map.toLowerCase().includes(searchTerm) ||
                    m.mission.toLowerCase().includes(searchTerm) ||
                    m.operation.toLowerCase().includes(searchTerm)
                );
            }

            if (diffFilter) {
                filtered = filtered.filter(m => {
                    const lowerDiff = m.difficulty.toLowerCase();
                    const filterLower = diffFilter.toLowerCase();
                    if (filterLower === 'reverse') {
                        return lowerDiff.includes('reverse');
                    }
                    return lowerDiff.includes(filterLower);
                });
            }

            if (statusFilter === 'done') {
                filtered = filtered.filter(m => m.checked);
            } else if (statusFilter === 'pending') {
                filtered = filtered.filter(m => !m.checked);
            }

            const total = missions.length;
            const done = checkedStates.filter(c => c).length;
            const pending = total - done;
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('progressPercent').textContent = percent + '%';

            tbody.innerHTML = '';
            filtered.forEach((m) => {
                const row = document.createElement('tr');
                const rowClass = getRowClass(m.difficulty);
                if (rowClass) row.className = rowClass;

                const diffClass = getDifficultyClass(m.difficulty);

                row.innerHTML = `
                    <td class="map-name">${m.map}</td>
                    <td class="mission-name">${m.mission}</td>
                    <td class="feito-cell">
                        <label class="checkbox-container">
                            <input type="checkbox" ${m.checked ? 'checked' : ''} data-index="${m.index}">
                            <span class="checkmark"></span>
                        </label>
                    </td>
                    <td><span class="${diffClass}">${m.difficulty}</span></td>
                    <td class="operation-name">${m.operation}</td>
                `;

                tbody.appendChild(row);
            });

            document.querySelectorAll('.checkbox-container input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', function() {
                    const index = parseInt(this.dataset.index);
                    checkedStates[index] = this.checked;
                    saveProgress();
                    renderTable();
                });
            });
        }

        // ============================================================
        // FUNÇÕES DE BOTÕES
        // ============================================================

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function resetProgress() {
            if (confirm('⚠️ Tem certeza que deseja resetar todo o progresso?')) {
                checkedStates = new Array(missions.length).fill(false);
                saveProgress();
                renderTable();
                showToast('🔄 Progresso resetado!');
            }
        }

        function exportProgress() {
            const data = {
                version: '1.0',
                exportedAt: new Date().toISOString(),
                totalMissions: missions.length,
                progress: checkedStates
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mvm_progress_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Progresso exportado!');
        }

        function importProgress(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.progress && Array.isArray(data.progress) && data.progress.length === missions.length) {
                        checkedStates = data.progress;
                        saveProgress();
                        renderTable();
                        showToast('📥 Progresso importado com sucesso!');
                    } else {
                        showToast('❌ Arquivo inválido!', true);
                    }
                } catch (err) {
                    showToast('❌ Erro ao ler o arquivo!', true);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        // EVENTOS E INICIALIZAÇÃO
        // ============================================================

        searchInput.addEventListener('input', renderTable);
        filterDifficulty.addEventListener('change', renderTable);
        filterStatus.addEventListener('change', renderTable);

        renderTable();

        // Salvar automaticamente ao fechar a página
        window.addEventListener('beforeunload', saveProgress);

        console.log('✅ MvM Tracker carregado!');
        console.log(`📊 ${missions.length} missões carregadas.`);
        console.log(`✅ ${checkedStates.filter(c => c).length} concluídas.`);
    </script>
