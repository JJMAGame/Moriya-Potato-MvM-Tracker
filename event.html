<!-- ============================================================ -->
<!-- BOTÃO E POP-UP COM IFRAME                                     -->
<!-- ============================================================ -->

<style>
    /* Botão Eventos - Verde Claro */
    .btn-event {
        background: #27ae60;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
    }

    .btn-event:hover {
        background: #2ecc71;
        transform: scale(1.02);
    }

    /* ============================================================
       POP-UP
    ============================================================ */
    .events-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.85);
        z-index: 2000;
        justify-content: center;
        align-items: center;
    }

    .events-modal-overlay.active {
        display: flex;
    }

    .events-modal {
        background: #16213e;
        border-radius: 12px;
        padding: 0;
        max-width: 900px;
        width: 95%;
        max-height: 90vh;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.9);
        border: 1px solid #2a2a4a;
        display: flex;
        flex-direction: column;
    }

    .events-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        border-bottom: 2px solid #2a2a4a;
        background: #0f3460;
        flex-shrink: 0;
    }

    .events-modal-header h2 {
        color: #e0e0e0;
        margin: 0;
        font-size: 20px;
    }

    .events-modal-header .close-btn {
        background: #c0392b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .events-modal-header .close-btn:hover {
        background: #e74c3c;
    }

    .events-modal-body {
        padding: 0;
        overflow-y: auto;
        flex: 1;
        background: #1a1a2e;
        min-height: 400px;
    }

    /* ============================================================
       IFRAME DENTRO DO POP-UP
    ============================================================ */
    .events-modal-body iframe {
        width: 100%;
        height: 100%;
        min-height: 500px;
        border: none;
        border-radius: 0;
        background: #16213e;
        display: block;
    }

    .events-modal-body .loading {
        color: #85c1e9;
        text-align: center;
        padding: 40px;
        font-size: 18px;
    }

    .events-modal-body .error {
        color: #e74c3c;
        text-align: center;
        padding: 40px;
        font-size: 18px;
    }

    @media (max-width: 600px) {
        .events-modal {
            max-height: 95vh;
            width: 98%;
        }

        .events-modal-body iframe {
            min-height: 400px;
        }

        .events-modal-header h2 {
            font-size: 16px;
        }
    }
</style>

<!-- ============================================================ -->
<!-- BOTÃO - COLOQUE NA SUA BARRA DE AÇÕES                        -->
<!-- ============================================================ -->

<button class="btn-event" onclick="abrirEventos()">📅 Eventos</button>

<!-- ============================================================ -->
<!-- POP-UP COM IFRAME                                             -->
<!-- ============================================================ -->

<div class="events-modal-overlay" id="eventsModal">
    <div class="events-modal">
        <div class="events-modal-header">
            <h2>📅 Eventos</h2>
            <button class="close-btn" onclick="fecharEventos()">✕ Fechar</button>
        </div>
        <div class="events-modal-body" id="eventsModalBody">
            <!-- ============================================================
                 O IFRAME VAI SER INSERIDO AQUI PELO JAVASCRIPT
            ============================================================ -->
            <div class="loading">⏳ Carregando eventos...</div>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- JAVASCRIPT                                                    -->
<!-- ============================================================ -->

<script>
    // ============================================================
    // ABRIR/FECHAR POP-UP
    // ============================================================
    function abrirEventos() {
        const modal = document.getElementById('eventsModal');
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        carregarEventHTML();
    }

    function fecharEventos() {
        document.getElementById('eventsModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // Fecha ao clicar fora
    document.getElementById('eventsModal').addEventListener('click', function(e) {
        if (e.target === this) {
            fecharEventos();
        }
    });

    // Fecha com ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            fecharEventos();
        }
    });

    // ============================================================
    // CARREGAR O EVENT.HTML DENTRO DO IFRAME
    // ============================================================
    function carregarEventHTML() {
        const body = document.getElementById('eventsModalBody');

        // ============================================================
        // 🔥 AQUI ESTÁ O IFRAME - ELE É INSERIDO AQUI!
        // ============================================================
        body.innerHTML = `
            <iframe src="event.html" id="eventIframe"></iframe>
        `;

        // O iframe carrega o event.html automaticamente
        console.log('📄 event.html carregado no iframe');
    }

    console.log('✅ Botão Eventos carregado!');
    console.log('📄 O event.html será carregado dentro do iframe');
</script>
