<!-- ============================================================ -->
<!-- BOTÃO E MODAL PARA LER A PASTA DO GITHUB                      -->
<!-- ============================================================ -->

<style>
    /* Botão GitHub */
    .btn-github {
        background: #6e5494;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
    }

    .btn-github:hover {
        background: #8b6cb0;
        transform: scale(1.02);
    }

    /* Botão Atualizar */
    .btn-refresh {
        background: #f39c12;
        color: white;
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        transition: all 0.3s ease;
    }

    .btn-refresh:hover {
        background: #f1c40f;
        transform: scale(1.02);
    }

    /* Modal */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal {
        background: #16213e;
        border-radius: 12px;
        padding: 30px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .modal-header h2 {
        color: #e0e0e0;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .modal-header .close-btn {
        background: #c0392b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 600;
    }

    .modal-header .close-btn:hover {
        background: #e74c3c;
    }

    .modal-info {
        color: #85c1e9;
        margin-bottom: 15px;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }

    .file-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .file-list li {
        background: #1a1a2e;
        margin: 5px 0;
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid #2a2a4a;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #c0c0c0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .file-list li:hover {
        background: #0f3460;
        border-color: #e94560;
        transform: scale(1.01);
    }

    .file-list li .file-date {
        font-size: 12px;
        color: #85c1e9;
    }

    .file-list .loading {
        color: #f39c12;
        text-align: center;
        padding: 20px;
    }

    .file-list .empty {
        color: #7f8c8d;
        text-align: center;
        padding: 20px;
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #27ae60;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.4s ease;
        z-index: 999;
    }

    .toast.show {
        transform: translateY(0);
        opacity: 1;
    }

    .toast.error {
        background: #c0392b;
    }

    .toast.info {
        background: #2980b9;
    }
</style>

<!-- ============================================================ -->
<!-- HTML DO BOTÃO E MODAL                                          -->
<!-- ============================================================ -->

<!-- Botão para abrir o modal -->
<button class="btn-github" onclick="abrirModalGitHub()">📂 Ler Pasta GitHub</button>

<!-- Modal -->
<div class="modal-overlay" id="githubModal">
    <div class="modal">
        <div class="modal-header">
            <h2>📂 Arquivos da Pasta</h2>
            <button class="close-btn" onclick="fecharModalGitHub()">✕ Fechar</button>
        </div>
        
        <div class="modal-info">
            <span>📁 <strong id="pastaNome">save-progress</strong></span>
            <button class="btn-refresh" onclick="atualizarLista()">🔄 Atualizar</button>
        </div>
        
        <ul class="file-list" id="fileList">
            <li class="loading">⏳ Carregando arquivos...</li>
        </ul>
    </div>
</div>

<!-- Toast para notificações -->
<div id="toast" class="toast"></div>

<!-- ============================================================ -->
<!-- JAVASCRIPT                                                    -->
<!-- ============================================================ -->

<script>
    // ============================================================
    // CONFIGURAÇÃO - ALTERE AQUI!
    // ============================================================
    const GITHUB_REPO = 'SEU_USUARIO/SEU_REPOSITORIO';  // Ex: 'joaosilva/mvm-tracker'
    const GITHUB_BRANCH = 'main';                       // 'main' ou 'master'
    const SAVE_FOLDER = 'save-progress';                // Nome da pasta

    // ============================================================
    // FUNÇÕES
    // ============================================================

    // Abrir modal
    function abrirModalGitHub() {
        const modal = document.getElementById('githubModal');
        modal.classList.add('active');
        document.getElementById('pastaNome').textContent = SAVE_FOLDER;
        listarArquivosGitHub();
    }

    // Fechar modal
    function fecharModalGitHub() {
        document.getElementById('githubModal').classList.remove('active');
    }

    // Fecha modal ao clicar fora
    document.getElementById('githubModal').addEventListener('click', function(e) {
        if (e.target === this) {
            fecharModalGitHub();
        }
    });

    // Atualizar lista (botão)
    function atualizarLista() {
        listarArquivosGitHub();
        showToast('🔄 Lista atualizada!', 'info');
    }

    // ============================================================
    // LER A PASTA DO GITHUB
    // ============================================================
    async function listarArquivosGitHub() {
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '<li class="loading">⏳ Carregando arquivos...</li>';

        try {
            // URL da API do GitHub para listar a pasta
            const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${SAVE_FOLDER}?ref=${GITHUB_BRANCH}`;
            const response = await fetch(url);

            if (!response.ok) {
                if (response.status === 404) {
                    fileList.innerHTML = `<li class="empty">📂 Pasta "${SAVE_FOLDER}" não encontrada</li>`;
                    return;
                }
                throw new Error(`Erro ${response.status}`);
            }

            const data = await response.json();

            // Filtra apenas arquivos .json
            const jsonFiles = data.filter(item => 
                item.type === 'file' && 
                item.name.endsWith('.json')
            );

            if (jsonFiles.length === 0) {
                fileList.innerHTML = '<li class="empty">📭 Nenhum arquivo .json encontrado</li>';
                return;
            }

            // Ordena por data (mais recente primeiro)
            jsonFiles.sort((a, b) => new Date(b.sha) - new Date(a.sha));

            // Monta a lista
            fileList.innerHTML = '';
            jsonFiles.forEach(file => {
                const li = document.createElement('li');
                
                // Extrai a data do nome do arquivo (formato: algo_2024-01-15.json)
                let dataExibicao = '';
                const match = file.name.match(/(\d{4}-\d{2}-\d{2})/);
                if (match) {
                    const partes = match[1].split('-');
                    dataExibicao = `${partes[2]}/${partes[1]}/${partes[0]}`;
                } else {
                    // Se não tiver data no nome, usa a data do commit
                    const dataCommit = new Date(file.sha);
                    dataExibicao = dataCommit.toLocaleDateString('pt-BR');
                }

                li.innerHTML = `
                    <span>📄 ${file.name}</span>
                    <span class="file-date">${dataExibicao}</span>
                `;

                li.addEventListener('click', () => {
                    importarArquivo(file.download_url, file.name);
                });

                fileList.appendChild(li);
            });

        } catch (error) {
            console.error('Erro ao listar arquivos:', error);
            fileList.innerHTML = `<li class="empty">❌ Erro: ${error.message}</li>`;
            showToast('❌ Erro ao ler a pasta', 'error');
        }
    }

    // ============================================================
    // IMPORTAR ARQUIVO
    // ============================================================
    async function importarArquivo(url, fileName) {
        try {
            showToast(`⏳ Baixando ${fileName}...`, 'info');

            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Erro ${response.status}`);
            }

            const data = await response.json();

            // Verifica se o JSON tem o campo "progress"
            if (data.progress && Array.isArray(data.progress)) {
                // Salva no localStorage
                localStorage.setItem('mvm_progress', JSON.stringify(data.progress));
                
                // Fecha o modal
                fecharModalGitHub();
                
                // Mostra notificação
                const total = data.progress.length;
                const concluidas = data.progress.filter(c => c).length;
                showToast(`✅ "${fileName}" importado! (${concluidas}/${total})`);
                
                // Recarrega a página para aplicar as mudanças
                setTimeout(() => {
                    location.reload();
                }, 1000);
                
                console.log('📥 Arquivo importado:', fileName);
                console.log(`📊 ${concluidas} de ${total} missões concluídas`);
                
            } else {
                showToast('❌ Arquivo JSON inválido (campo "progress" não encontrado)', 'error');
            }

        } catch (error) {
            console.error('Erro ao importar:', error);
            showToast(`❌ Erro ao importar: ${error.message}`, 'error');
        }
    }

    // ============================================================
    // TOAST (NOTIFICAÇÕES)
    // ============================================================
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast';
        if (type === 'error') toast.classList.add('error');
        if (type === 'info') toast.classList.add('info');
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    console.log('✅ Botão GitHub carregado!');
    console.log(`📂 Lendo pasta: ${SAVE_FOLDER}`);
    console.log(`🔗 Repositório: ${GITHUB_REPO}`);
</script>
